<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">VoidLLM deployment overview</title>
  <desc id="desc">An overview of the VoidLLM Docker Compose stack showing the public domain, Nginx proxy, VoidLLM services, and Let's Encrypt certificate flow.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6f7fb" />
      <stop offset="100%" stop-color="#e7eef8" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fbff" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f766e" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#1f2937" flood-opacity="0.14" />
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0,0 L14,7 L0,14 z" fill="#0f172a" />
    </marker>
    <style>
      .title { font: 700 46px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 22px Arial, sans-serif; fill: #334155; }
      .label { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 18px Arial, sans-serif; fill: #475569; }
      .tiny { font: 600 16px Arial, sans-serif; fill: #0f172a; letter-spacing: 1.2px; }
      .mono { font: 600 18px 'SFMono-Regular', Consolas, monospace; fill: #0f172a; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="1320" cy="130" r="180" fill="#dbeafe" opacity="0.7" />
  <circle cx="220" cy="760" r="220" fill="#ccfbf1" opacity="0.65" />

  <text x="90" y="100" class="title">VoidLLM + Nginx + Let's Encrypt</text>
  <text x="90" y="140" class="subtitle">Release-ready Docker Compose layout with split admin and proxy traffic.</text>

  <rect x="90" y="205" width="330" height="180" rx="28" fill="url(#card)" filter="url(#shadow)" />
  <rect x="118" y="235" width="120" height="36" rx="18" fill="#dbeafe" />
  <text x="148" y="259" class="tiny">PUBLIC DNS</text>
  <text x="125" y="315" class="label">your-domain.tld</text>
  <text x="125" y="352" class="small">Ports 80 and 443 point at the Docker host.</text>

  <rect x="530" y="180" width="440" height="250" rx="32" fill="url(#card)" filter="url(#shadow)" />
  <rect x="560" y="214" width="160" height="38" rx="19" fill="#ccfbf1" />
  <text x="602" y="239" class="tiny">NGINX EDGE</text>
  <text x="565" y="306" class="label">TLS termination + routing</text>
  <text x="565" y="345" class="small">`/v1/*` -> VoidLLM proxy on 8080</text>
  <text x="565" y="378" class="small">`/` and `/api/*` -> VoidLLM admin on 8443</text>
  <text x="565" y="411" class="small">`/.well-known/acme-challenge/*` -> Certbot webroot</text>

  <rect x="1110" y="160" width="360" height="210" rx="30" fill="url(#card)" filter="url(#shadow)" />
  <rect x="1140" y="194" width="170" height="38" rx="19" fill="#fee2e2" />
  <text x="1178" y="219" class="tiny">LET'S ENCRYPT</text>
  <text x="1145" y="286" class="label">ACME HTTP-01</text>
  <text x="1145" y="322" class="small">Certbot requests the first certificate if</text>
  <text x="1145" y="351" class="small">the mounted cert volume is still empty.</text>

  <rect x="430" y="545" width="640" height="250" rx="34" fill="url(#card)" filter="url(#shadow)" />
  <rect x="465" y="580" width="165" height="38" rx="19" fill="#e9d5ff" />
  <text x="503" y="605" class="tiny">VOIDLLM APP</text>
  <text x="470" y="668" class="label">Split internal listeners</text>
  <text x="470" y="706" class="mono">:8080  OpenAI-compatible proxy + health</text>
  <text x="470" y="742" class="mono">:8443  Admin UI + admin API + Swagger</text>

  <rect x="1110" y="555" width="360" height="220" rx="30" fill="url(#card)" filter="url(#shadow)" />
  <rect x="1140" y="589" width="185" height="38" rx="19" fill="#fde68a" />
  <text x="1172" y="614" class="tiny">PERSISTENT DATA</text>
  <text x="1145" y="680" class="label">Mounted volumes</text>
  <text x="1145" y="716" class="mono">/data/voidllm.db</text>
  <text x="1145" y="748" class="mono">/etc/letsencrypt/live</text>

  <line x1="420" y1="295" x2="530" y2="295" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="970" y1="295" x2="1110" y2="265" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="750" y1="430" x2="750" y2="545" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="970" y1="650" x2="1110" y2="650" stroke="#0f172a" stroke-width="4" marker-end="url(#arrow)" />

  <rect x="80" y="820" width="1440" height="16" rx="8" fill="url(#accent)" opacity="0.92" />
</svg>
