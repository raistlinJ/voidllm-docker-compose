<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">VoidLLM first launch checklist</title>
  <desc id="desc">A visual checklist showing the environment variables, docker compose commands, and first-run verification steps for the stack.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff8f1" />
      <stop offset="100%" stop-color="#eef6ff" />
    </linearGradient>
    <linearGradient id="terminal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#1e293b" />
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#f8fafc" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.16" />
    </filter>
    <style>
      .title { font: 700 46px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 22px Arial, sans-serif; fill: #334155; }
      .label { font: 700 25px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 18px Arial, sans-serif; fill: #475569; }
      .mono { font: 600 19px 'SFMono-Regular', Consolas, monospace; fill: #e2e8f0; }
      .mono-dark { font: 600 18px 'SFMono-Regular', Consolas, monospace; fill: #0f172a; }
      .tiny { font: 700 16px Arial, sans-serif; fill: #0f172a; letter-spacing: 1.2px; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)" />
  <circle cx="1420" cy="130" r="180" fill="#dbeafe" opacity="0.7" />
  <circle cx="200" cy="720" r="190" fill="#ffedd5" opacity="0.8" />

  <text x="90" y="100" class="title">First launch checklist</text>
  <text x="90" y="140" class="subtitle">The exact order to verify DNS, issue the first certificate, and capture the bootstrap credentials.</text>

  <rect x="90" y="200" width="560" height="510" rx="32" fill="url(#terminal)" filter="url(#shadow)" />
  <circle cx="130" cy="235" r="9" fill="#fb7185" />
  <circle cx="158" cy="235" r="9" fill="#fbbf24" />
  <circle cx="186" cy="235" r="9" fill="#34d399" />
  <text x="120" y="290" class="mono">cp .env.example .env</text>
  <text x="120" y="330" class="mono">openssl rand -base64 32</text>
  <text x="120" y="370" class="mono">docker compose up -d</text>
  <text x="120" y="410" class="mono">docker compose logs -f certbot nginx voidllm</text>
  <text x="120" y="450" class="mono">dig +short A $DOMAIN</text>
  <text x="120" y="490" class="mono">curl http://$DOMAIN/.well-known/acme-challenge/test</text>
  <text x="120" y="530" class="mono">docker compose up -d certbot</text>
  <text x="120" y="580" class="mono">Open https://$DOMAIN</text>
  <text x="120" y="630" class="mono">Save the one-time VoidLLM bootstrap credentials</text>

  <rect x="740" y="200" width="760" height="220" rx="30" fill="url(#card)" filter="url(#shadow)" />
  <rect x="775" y="234" width="150" height="38" rx="19" fill="#bfdbfe" />
  <text x="816" y="259" class="tiny">.ENV KEYS</text>
  <text x="780" y="314" class="mono-dark">DOMAIN=voidllm.example.com</text>
  <text x="780" y="348" class="mono-dark">LETSENCRYPT_EMAIL=admin@example.com</text>
  <text x="780" y="382" class="mono-dark">LETSENCRYPT_STAGING=1</text>

  <rect x="740" y="470" width="360" height="245" rx="30" fill="url(#card)" filter="url(#shadow)" />
  <rect x="770" y="504" width="115" height="38" rx="19" fill="#ccfbf1" />
  <text x="807" y="529" class="tiny">STEP 1</text>
  <text x="775" y="590" class="label">Check DNS first</text>
  <text x="775" y="628" class="small">The domain must resolve to the public IP</text>
  <text x="775" y="656" class="small">of the Docker host before Certbot can pass</text>
  <text x="775" y="684" class="small">the HTTP-01 challenge.</text>

  <rect x="1140" y="470" width="360" height="245" rx="30" fill="url(#card)" filter="url(#shadow)" />
  <rect x="1170" y="504" width="115" height="38" rx="19" fill="#fde68a" />
  <text x="1207" y="529" class="tiny">STEP 2</text>
  <text x="1175" y="590" class="label">Use staging first</text>
  <text x="1175" y="628" class="small">Keep `LETSENCRYPT_STAGING=1` until</text>
  <text x="1175" y="656" class="small">you know port 80 validation works.</text>
  <text x="1175" y="684" class="small">Then switch to the real CA.</text>

  <rect x="740" y="750" width="760" height="95" rx="26" fill="#0f766e" opacity="0.94" filter="url(#shadow)" />
  <text x="780" y="808" style="font: 700 28px Arial, sans-serif; fill: #ecfeff;">If HTTPS still returns 503, Nginx is waiting for the first successful certificate.</text>
</svg>